<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2B2B" />
    <title>Two-Do</title>
    <style>
      html, body, #root { height: 100%; margin: 0; background: #1B2B2B; }
      body { -webkit-font-smoothing: antialiased; }
      /* Scroll is implicit — no scrollbars anywhere; clipped content (and the
         existing edge-fade scrims on chip rows) implies more lies beyond.
         Scrolling itself — wheel, touch, keyboard, programmatic — is unchanged. */
      * { scrollbar-width: none; -ms-overflow-style: none; }
      *::-webkit-scrollbar { width: 0; height: 0; display: none; }
      /* .no-sb is now redundant (kept as a harmless no-op for existing usages). */
      /* Gentle float for the + button. */
      @keyframes twodoFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .twodo-fab { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B2B2B" />
    <title>Two-Do</title>
    <style>
      html, body, #root { height: 100%; margin: 0; background: #1B2B2B; }
      body { -webkit-font-smoothing: antialiased; }
      /* Themed scrollbars everywhere (no default white bars). */
      * { scrollbar-width: thin; scrollbar-color: #2C4040 transparent; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2C4040; border-radius: 6px; border: 2px solid #1B2B2B; }
      ::-webkit-scrollbar-thumb:hover { background: #3A5050; }
      ::-webkit-scrollbar-corner { background: transparent; }
      /* Chip rows: no scrollbar, scroll implied by an edge fade. */
      .no-sb { scrollbar-width: none; -ms-overflow-style: none; }
      .no-sb::-webkit-scrollbar { display: none; }
      /* Gentle float for the + button. */
      @keyframes twodoFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .twodo-fab { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
